name: Scrape Pokemon Card Lottery Information

on:
  schedule:
    # 1日4回実行: 9:15, 12:15, 18:15, 21:15 JST（GH Actions混雑回避）
    - cron: '15 0 * * *'   # 9:15 JST (0:15 UTC)
    - cron: '15 3 * * *'   # 12:15 JST (3:15 UTC)
    - cron: '15 9 * * *'   # 18:15 JST (9:15 UTC)
    - cron: '15 12 * * *'  # 21:15 JST (12:15 UTC)
  workflow_dispatch: # 手動実行も可能

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/ms-playwright-*
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run tests
        timeout-minutes: 2
        run: |
          pip install pytest pytest-cov
          python -m pytest tests/ -q --cov=scrapers --cov=. --cov-report=term-missing

      - name: Run scraper
        timeout-minutes: 10
        env:
          ENABLE_EMAIL_NOTIFICATION: 'true'
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          # X (Twitter) API credentials
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          python main.py

      - name: Commit scraping data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update lottery data $(date +'%Y-%m-%d %H:%M:%S')" && git push)

      - name: Generate HTML report
        timeout-minutes: 2
        continue-on-error: true
        run: |
          python generate_html_report.py

      - name: Commit HTML report if changed
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/lottery_report.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update HTML report $(date +'%Y-%m-%d %H:%M:%S')" && git push)

      - name: Notify on success
        if: success()
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          python << 'EOFPYTHON'
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('Workflow completed successfully!\n\nTests passed and lottery data updated.\n\nRun: https://github.com/' + os.environ.get('REPO','') + '/actions/runs/' + os.environ.get('RUN_ID',''))
          msg['Subject'] = '✅ Pokemon Card Tracker - Success'
          msg['From'] = os.environ.get('SMTP_USERNAME','')
          msg['To'] = os.environ.get('RECIPIENT_EMAIL','')
          port = int(os.environ.get('SMTP_PORT','587'))
          if port == 465:
              server = smtplib.SMTP_SSL(os.environ.get('SMTP_SERVER',''), port, timeout=30)
          else:
              server = smtplib.SMTP(os.environ.get('SMTP_SERVER',''), port, timeout=30)
              server.ehlo()
              server.starttls()
              server.ehlo()
          server.login(os.environ.get('SMTP_USERNAME',''), os.environ.get('SMTP_PASSWORD',''))
          server.sendmail(msg['From'], msg['To'], msg.as_string())
          server.quit()
          EOFPYTHON

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          python << 'EOFPYTHON'
          import os, smtplib
          from email.mime.text import MIMEText
          msg = MIMEText('Workflow failed. Check logs: https://github.com/' + os.environ.get('REPO','') + '/actions/runs/' + os.environ.get('RUN_ID',''))
          msg['Subject'] = '⚠️ Pokemon Card Tracker - Failed'
          msg['From'] = os.environ.get('SMTP_USERNAME','')
          msg['To'] = os.environ.get('RECIPIENT_EMAIL','')
          port = int(os.environ.get('SMTP_PORT','587'))
          if port == 465:
              server = smtplib.SMTP_SSL(os.environ.get('SMTP_SERVER',''), port, timeout=30)
          else:
              server = smtplib.SMTP(os.environ.get('SMTP_SERVER',''), port, timeout=30)
              server.ehlo()
              server.starttls()
              server.ehlo()
          server.login(os.environ.get('SMTP_USERNAME',''), os.environ.get('SMTP_PASSWORD',''))
          server.sendmail(msg['From'], msg['To'], msg.as_string())
          server.quit()
          EOFPYTHON
